name: Update Dashboard Data

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 07:00 ART, todos los días
  workflow_dispatch:         # también se puede correr a mano desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth

      - name: Run update script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python update_data.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes, skipping commit." || \
            git commit -m "chore: update RAW_DATA $(date -u +%Y-%m-%d)" && git push
